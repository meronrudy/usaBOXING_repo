name: Peakmodoro
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  PeakmodoroiPhone:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources/PeakmodoroShared
      - Sources/PeakmodoroiPhoneApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peakmodoro.iphone
        INFOPLIST_FILE: Resources/iPhone/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/iPhone/PeakmodoroiPhone.entitlements
  PeakmodoroWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - Sources/PeakmodoroShared
      - Sources/PeakmodoroWatchApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peakmodoro.watch
        INFOPLIST_FILE: Resources/Watch/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Watch/PeakmodoroWatch.entitlements
  PeakmodoroMac:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - Sources/PeakmodoroShared
      - Sources/PeakmodoroMacApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peakmodoro.mac
        INFOPLIST_FILE: Resources/Mac/Info.plist
